name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate lockfile
        run: npm ci --ignore-scripts

      - name: Bootstrap pinned dependencies
        run: ./scripts/bootstrap.sh

      - name: Verify dependency integrity
        run: ./scripts/verify_dependency_integrity.sh

  test:
    runs-on: ubuntu-latest
    needs: integrity
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

      - name: Coverage
        run: forge coverage --report lcov
